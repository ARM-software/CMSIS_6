layer:
  type: App
  description: Validation of CMSIS-Core implementation (Bootloader part)

  # packs:
  #   - pack: ARM::CMSIS

  add-path:
    - ../../../Include
    - ../../../Source/Config
    - ../../../Source/Clang_TI_Semihost

  groups:
    - group: Source Files
      files:
        - file: ./bootloader.c

    - group: TI Arm Clang Compiler Semihost Support
      for-compiler: CLANG_TI
      files:
        - file: ../../../Source/Clang_TI_Semihost/clang_ti_fastmodel_cio.c
        - file: ../../../Source/Clang_TI_Semihost/clang_ti_semihost.c
        - file: ../../../Source/Clang_TI_Semihost/clang_ti_vprintf_semihost.c
